name: HS300 每日选股推送

on:
  schedule:
    # 每天北京时间 00:00（UTC 16:00）；脚本内判断是否为 A 股交易日，非交易日自动跳过
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      screen_date:
        description: "截面日 YYYY-MM-DD（留空=北京时间当日，须为交易日）"
        required: false
        type: string

concurrency:
  group: hs300-daily-screen
  cancel-in-progress: false

jobs:
  screen-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run HS300 screen and Server酱 push
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          AK_REQUEST_THROTTLE: "3"
          TZ: Asia/Shanghai
        run: |
          mkdir -p outputs
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.screen_date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.screen_date }}"
          fi
          python strategies/run_hs300_akshare.py \
            --screen \
            --push \
            --trading-day-only \
            --workers 1 \
            --output outputs/hs300_screen_today.csv \
            $DATE_ARG

      - name: Upload CSV artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: hs300-screen-${{ github.run_id }}
          path: outputs/hs300_screen_*.csv
          retention-days: 30

      - name: Notify failure via Server酱
        if: failure()
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: |
          python - <<'PY'
          import os
          key = os.environ.get("SERVERCHAN_SENDKEY", "").strip()
          if not key:
              print("Skip failure notify: SERVERCHAN_SENDKEY not set")
              raise SystemExit(0)
          from serverchan_push import send_serverchan
          repo = os.environ.get("GITHUB_REPOSITORY", "")
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          url = f"https://github.com/{repo}/actions/runs/{run_id}" if repo and run_id else ""
          send_serverchan(
              "HS300选股 GitHub Actions 失败",
              f"工作流运行失败，请查看日志。\n\n{url}",
          )
          PY
