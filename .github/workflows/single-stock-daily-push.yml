name: 单股指标每日推送

on:
  schedule:
    # 每天北京时间 20:00（UTC 12:00）；与 HS300（00:00）错开避免接口限流
    - cron: "0 12 * * *"
  workflow_dispatch:

concurrency:
  group: single-stock-daily-push
  cancel-in-progress: false

jobs:
  score-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scoring and Server酱 push
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          AK_REQUEST_THROTTLE: "3"
          TZ: Asia/Shanghai
          # 持仓
          HOLDING_CODES: "600519,600031"
          # 关注（拟入手）
          TARGET_CODES: "603444,300628,603369,000596"
          WATCH_CODES: "600519,600031,603444,300628,603369,000596"
        run: |
          mkdir -p outputs
          python daily_push_serverchan.py \
            --trading-day-only \
            --output-dir outputs

      - name: Upload Excel artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: single-stock-score-${{ github.run_id }}
          path: outputs/single_stock_score_*.xlsx
          retention-days: 30
          if-no-files-found: ignore

      - name: Notify failure via Server酱
        if: failure()
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: |
          python - <<'PY'
          import os
          key = os.environ.get("SERVERCHAN_SENDKEY", "").strip()
          if not key:
              print("Skip failure notify: SERVERCHAN_SENDKEY not set")
              raise SystemExit(0)
          from serverchan_push import send_serverchan
          repo = os.environ.get("GITHUB_REPOSITORY", "")
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          url = f"https://github.com/{repo}/actions/runs/{run_id}" if repo and run_id else ""
          send_serverchan(
              "单股指标 GitHub Actions 失败",
              f"工作流运行失败，请查看日志。\n\n{url}",
          )
          PY
